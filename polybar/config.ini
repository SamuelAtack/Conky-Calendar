[colors]
background = #0a0e1c
background-alt = #0d1530
foreground = #CCCCCC
primary = #00FFD0
secondary = #00CED1
alert = #FF8C00
dim = #80E8EB

[bar/main]
monitor = eDP-1
width = 100%
height = 32
offset-x = 0
offset-y = 0
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.primary}

border-bottom-size = 2
border-bottom-color = ${colors.secondary}

padding-left = 2
padding-right = 2
module-margin-left = 1
module-margin-right = 1

font-0 = Ubuntu Mono:size=10;2
font-1 = Ubuntu Mono:bold:size=10;2

modules-left = date
modules-center =
modules-right = cpu memory filesystem wireless battery

separator = %{F#00CED1} | %{F-}

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M:%S
label = %{F#00FFD0}%date%%{F-}  %{F#CCCCCC}%time%%{F-}

[module/cpu]
type = internal/cpu
interval = 2
label = %{F#00FFD0}CPU%{F-} %{F#CCCCCC}%percentage%%%{F-}

[module/memory]
type = internal/memory
interval = 2
label = %{F#00FFD0}RAM%{F-} %{F#CCCCCC}%used% / %total%%{F-}

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30
label-mounted = %{F#00FFD0}DISK%{F-} %{F#CCCCCC}%percentage_used%%%{F-}

[module/wireless]
type = internal/network
interface = wlp0s20f3
interval = 3
label-connected = %{F#00FFD0}NET%{F-} %{F#CCCCCC}%essid% %downspeed%%{F-}
label-disconnected = %{F#FF8C00}NET offline%{F-}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC0
full-at = 98
label-charging = %{F#00FFD0}BAT%{F-} %{F#FF8C00}%percentage%%%{F-}+
label-discharging = %{F#00FFD0}BAT%{F-} %{F#CCCCCC}%percentage%%%{F-}
label-full = %{F#00FFD0}BAT%{F-} %{F#00FFD0}full%{F-}

[settings]
screenchange-reload = true
